  beschreibung: |+
                Auf der Suche nach einer seriösen Tätigkeit gründeten Frank S., Dean M.\ und Sammy D.\ die Rat-Pack-Sound-OHG.
                Die Firma hat sich auf die Fertigung hochwertiger HiFi-Verstärker spezialisiert und beliefert Einzelhändler im gesamten europäischen Raum.
                Um ihren Kunden ein komplettes Angebot erstellen zu können, werden weitere Komponenten dazu gekauft. Die eigenen Erzeugnisse sind

                * Verstärker "Röhre 1"
                * Verstärker "Röhre 2"
                * Verstärker "Chip"
